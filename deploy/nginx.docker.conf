# SPA (base /react-auth/) + reverse proxy to mock-server for /api/v1 and /content
#
# Used by the `web` service in docker-compose.yml. Upstream hostname `mock`
# matches the Compose service name.

upstream mock_backend {
    server mock:3001;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Mock API (same paths as Vite dev proxy)
    location /api/v1/ {
        proxy_pass http://mock_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /content/ {
        proxy_pass http://mock_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite production base path /react-auth/
    location /react-auth/ {
        rewrite ^/react-auth/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /react-auth {
        return 302 /react-auth/;
    }
}
