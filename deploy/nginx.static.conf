# SPA only — production build with real API (no mock upstream).
# Assets use base path /react-auth/

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    location /react-auth/ {
        rewrite ^/react-auth/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /react-auth {
        return 302 /react-auth/;
    }
}
