name: PR Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm --version

  lint:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2
      - run: npm ci
      - run: npm run test:coverage

  security-fs:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  preview:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v6.0.2

      - run: npm ci
      - run: npm run build

      - name: Deploy Preview
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview-${{ github.head_ref }}

      - name: Preview URL
        run: |
          echo "## 🚀 Preview URL" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview-${{ github.head_ref }}/" >> $GITHUB_STEP_SUMMARY