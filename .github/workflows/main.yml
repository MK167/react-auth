name: Main Pipeline

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Detect Environment
        id: setenv
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            ENV_NAME=prod
          else
            ENV_NAME=staging
          fi
          echo "env=${ENV_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6.0.0
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  # VERSIONING (Semantic Release)
  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.0.0
        with:
          node-version: lts/*

      - run: npm ci

      - name: Get current version (before release)
        id: version_before
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Get new version (after release)
        id: version_after
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Release Summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Old Version | ${{ steps.version_before.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.version_after.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f CHANGELOG.md ]; then
            echo "### 📜 Changelog" >> $GITHUB_STEP_SUMMARY
            tail -n 20 CHANGELOG.md >> $GITHUB_STEP_SUMMARY
          else
            echo "_No changelog file found_" >> $GITHUB_STEP_SUMMARY
          fi

  # DOCKER
  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Login DockerHub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-app:${{ steps.version.outputs.version }} .

      - name: Tag Docker Images
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/react-app:${{ steps.version.outputs.version }} ${{ secrets.DOCKER_USERNAME }}/react-app:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag ${{ secrets.DOCKER_USERNAME }}/react-app:${{ steps.version.outputs.version }} ${{ secrets.DOCKER_USERNAME }}/react-app:prod
          else
            docker tag ${{ secrets.DOCKER_USERNAME }}/react-app:${{ steps.version.outputs.version }} ${{ secrets.DOCKER_USERNAME }}/react-app:staging
          fi

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/react-app:${{ steps.version.outputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/react-app:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker push ${{ secrets.DOCKER_USERNAME }}/react-app:prod
          else
            docker push ${{ secrets.DOCKER_USERNAME }}/react-app:staging
          fi

  # SECURITY
  security-image:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/react-app:latest
          severity: CRITICAL
          exit-code: "1"

  # DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: [security-image, prepare]
    environment: ${{ needs.prepare.outputs.env_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

    