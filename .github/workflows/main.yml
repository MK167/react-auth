name: Main Pipeline

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  NODE_VERSION: 'lts/*'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # =============================================================================

  # 🟣 PREPARE

  # =============================================================================

  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.env }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect Environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

  # =============================================================================

  # 🔐 SECURITY (SHIFT LEFT 🔥)

  # =============================================================================

  security:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 🧹 Fix CodeQL disk issue
      - name: Clean workspace
        run: |
          rm -rf node_modules dist coverage

      - run: npm install --legacy-peer-deps

      # 🟣 CodeQL (stable)
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - uses: github/codeql-action/analyze@v3

      # 🔵 Dependencies
      - run: npm audit --audit-level=critical

      # 🔐 Secrets (smart behavior)
      # - name: Gitleaks
      #   uses: gitleaks/gitleaks-action@v2
      #   with:
      #     args: ${{ github.event_name == 'pull_request' && '' || '--exit-code=0' }}
      - name: Run Gitleaks (optional)
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "--exit-code=0 --report-format=sarif --report-path=results.sarif"

      # 📊 Summary step
      - name: Gitleaks Summary
        if: always()
        run: |
          echo "## 🔐 Gitleaks Scan Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f results.sarif ]; then
            COUNT=$(jq '.runs[0].results | length' results.sarif 2>/dev/null || echo 0)

            if [ "$COUNT" -gt 0 ]; then
              echo "⚠️ Found **$COUNT potential secrets**" >> $GITHUB_STEP_SUMMARY
              echo "👉 Fix later (non-blocking)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No secrets found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ No report generated" >> $GITHUB_STEP_SUMMARY
          fi

      # 📜 SBOM
      - uses: anchore/sbom-action@v0

      # 📦 FS scan
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  # =============================================================================

  # 🔵 BUILD

  # =============================================================================

  build:
    runs-on: ubuntu-latest
    needs: [prepare, security]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build App
        run: |
          if npm run build >/dev/null 2>&1; then
            npm run build
          else
            echo "No build step found"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            dist
            build
            .next

  # =============================================================================

  # 🚀 RELEASE

  # =============================================================================

  release:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Extract Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Save Version Artifact
        run: echo "${{ steps.version.outputs.version }}" > version.txt

      - uses: actions/upload-artifact@v7
        with:
          name: version
          path: version.txt

  # =============================================================================

  # 🐳 DOCKER IMAGE

  # =============================================================================

  release-draft:
    runs-on: ubuntu-latest
    needs: release
    outputs:
      has_openshift: ${{ steps.check_openshift.outputs.has_openshift }}

    steps:
      - name: Check OpenShift Token
        id: check_openshift
        env:
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
        run: |
          if [ -n "$OPENSHIFT_TOKEN" ]; then
            echo "has_openshift=true" >> $GITHUB_OUTPUT
          else
            echo "has_openshift=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: version

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check Dockerfile
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip Docker
        if: steps.check.outputs.exists == 'false'
        run: exit 0

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          docker build -t $IMAGE:$VERSION .

      - name: Tag Images
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}

          docker tag $IMAGE:$VERSION $IMAGE:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag $IMAGE:$VERSION $IMAGE:prod
          else
            docker tag $IMAGE:$VERSION $IMAGE:staging
          fi

      - name: Push Images
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}

          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker push $IMAGE:prod
          else
            docker push $IMAGE:staging
          fi

  # =============================================================================

  # 🔐 SECURITY IMAGE (OPTIONAL HEAVY)

  # =============================================================================

  security-image:
    runs-on: ubuntu-latest
    needs: release-draft

    steps:
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL
          exit-code: '1'

  # =============================================================================

  # 🚀 DEPLOY

  # =============================================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [security, prepare, "build"]

    environment: ${{ needs.prepare.outputs.env_name }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: dist

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # =============================================================================

  # 🔴 OPENSHIFT (OPTIONAL)

  # =============================================================================

  openshift:
    runs-on: ubuntu-latest
    needs: release-draft
    if: needs.docker.outputs.has_openshift == 'true'

    steps:
      - name: Login OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Deploy Image
        run: |
          oc set image deployment/${{ env.IMAGE_NAME }} \
            app=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
