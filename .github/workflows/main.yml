name: Main Pipeline

on:
  push:
    branches: [main, develop]

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Detect Environment
        id: setenv
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2
      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: build
          path: dist

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Login DockerHub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.sha }} .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.sha }}

  security-image:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy Summary
        run: |
          echo "## 🔐 Docker Image Scan Done" >> $GITHUB_STEP_SUMMARY

  deploy:
    runs-on: ubuntu-latest
    needs: [security-image, prepare]
    environment: ${{ needs.prepare.outputs.env_name }}

    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: build
          path: dist

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist