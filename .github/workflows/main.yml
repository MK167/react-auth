name: Main Pipeline

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  NODE_VERSION: lts/*

jobs:

# =============================================================================

# PREPARE

# =============================================================================

  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.env }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Detect Environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

# =============================================================================

# BUILD

# =============================================================================

  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Build App
        run: |
          if npm run build >/dev/null 2>&1; then
            npm run build
          else
            echo "No build step found"
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: build
          path: |
            dist
            build
            .next

# =============================================================================

# RELEASE (Semantic Versioning)

# =============================================================================

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

# =============================================================================

# DOCKER (SAFE CHECK)

# =============================================================================

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check Dockerfile
        id: check_docker
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no Dockerfile
        if: steps.check_docker.outputs.exists == 'false'
        run: |
          echo "No Dockerfile found — skipping Docker step"
          exit 0

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} .

      - name: Tag latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

# =============================================================================

# SECURITY (TRIVY)

# =============================================================================

  security:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Scan Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest || exit 0

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL
          exit-code: "1"

# =============================================================================

# DEPLOY (GitHub Pages)

# =============================================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [build, prepare]
    environment: ${{ needs.prepare.outputs.env_name }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: build
          path: dist

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

# =============================================================================

# OPENSHIFT (SAFE CHECK)

# =============================================================================

  openshift:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check OpenShift Config
        id: check_oc
        run: |
          if [ -z "${{ secrets.OPENSHIFT_TOKEN }}" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip OpenShift
        if: steps.check_oc.outputs.exists == 'false'
        run: |
          echo "OpenShift not configured — skipping"
          exit 0

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xvf oc.tar.gz
          sudo mv oc /usr/local/bin

      - name: Login OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Select Project
        run: oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy App
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

          oc new-app $IMAGE --name=${{ env.IMAGE_NAME }} || true
          oc set image deployment/${{ env.IMAGE_NAME }} ${{ env.IMAGE_NAME }}=$IMAGE || true
          oc expose svc/${{ env.IMAGE_NAME }} || true
