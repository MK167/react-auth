name: Main Pipeline

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  NODE_VERSION: 'lts/*'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # =============================================================================

  # 🟣 PREPARE

  # =============================================================================

  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect Environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci


  # =============================================================================

  # 🔵 BUILD

  # =============================================================================

  build:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build App
        run: |
          if npm run build >/dev/null 2>&1; then
            npm run build
          else
            echo "No build step found"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            build
            .next


  # =============================================================================

  # 🚀 RELEASE (Single Source of Truth)

  # =============================================================================

  release:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Extract Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Save Version Artifact
        run: echo "${{ steps.version.outputs.version }}" > version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: version
          path: version.txt


  # =============================================================================

  # 🐳 DOCKER (FIXED VERSION FLOW)

  # =============================================================================

  docker:
    runs-on: ubuntu-latest
    needs: release
    outputs:
      has_openshift: ${{ steps.check_openshift.outputs.has_openshift }}

    steps:
      - name: Check OpenShift Token
        id: check_openshift
        env:
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
        run: |
          if [ -n "$OPENSHIFT_TOKEN" ]; then
            echo "has_openshift=true" >> $GITHUB_OUTPUT
          else
            echo "has_openshift=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4

      - name: Download Version
        uses: actions/download-artifact@v4
        with:
          name: version

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check Dockerfile
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip Docker
        if: steps.check.outputs.exists == 'false'
        run: exit 0

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}

          docker build -t $IMAGE:$VERSION .

      - name: Tag Images
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}

          docker tag $IMAGE:$VERSION $IMAGE:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag $IMAGE:$VERSION $IMAGE:prod
          else
            docker tag $IMAGE:$VERSION $IMAGE:staging
          fi

      - name: Push Images
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}

          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker push $IMAGE:prod
          else
            docker push $IMAGE:staging
          fi


  # =============================================================================

  # 🔐 SECURITY (FULL DEVSECOPS)

  # =============================================================================

  security:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --legacy-peer-deps

      # 🟣 SAST
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - uses: github/codeql-action/analyze@v3

      # 🔵 Dependency scan
      - run: npm audit --audit-level=critical

      # 🔐 Secrets scan
      - uses: gitleaks/gitleaks-action@v2

      # 📜 SBOM
      - uses: anchore/sbom-action@v0

      # 🐳 Container scan
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL
          exit-code: "1"


  # =============================================================================

  # 🚀 DEPLOY (GitHub Pages)

  # =============================================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [security, prepare]
    environment: ${{ needs.prepare.outputs.env_name }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist


  # =============================================================================

  # 🔴 OPENSHIFT (OPTIONAL)

  # =============================================================================

  openshift:
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.has_openshift == 'true'

    steps:
      - name: Login OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Deploy Image
        run: |
          oc set image deployment/${{ env.IMAGE_NAME }} \
          app=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
